# ==============================================================================
# PROFIL DÉVELOPPEMENT — esphere-ass-eureka-server
# Activer avec : -Dspring.profiles.active=dev
# ==============================================================================

# ── Serveur dev (HTTP simple) ─────────────────────────────────────────────────
server:
  port: 8762

# ── Eureka dev ────────────────────────────────────────────────────────────────
eureka:
  instance:
    hostname: localhost
    ip-address: 127.0.0.1
    prefer-ip-address: true
    non-secure-port: 8762
  client:
    service-url:
      defaultZone: http://localhost:8762/eureka/
  server:
    # Self-preservation désactivée en dev (évite les faux positifs)
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 3000

# ── Actuator verbeux en dev ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# ── Logging verbeux en dev ────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{40}) - %msg%n"
