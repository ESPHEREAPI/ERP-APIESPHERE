spring:
  datasource:
    url: jdbc:mysql://localhost:3306/biometry?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:DeepWater@2021}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  config:
    import: "optional:configserver:"

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

services:
  visite-url: http://localhost:8084
  adherent-url: http://localhost:8082
  validation-url: http://localhost:8085

esphere:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: ${JWT_EXPIRATION:86400000}
  media:
    capture-expiry-hours: 24

logging:
  level:
    com.esphere: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
