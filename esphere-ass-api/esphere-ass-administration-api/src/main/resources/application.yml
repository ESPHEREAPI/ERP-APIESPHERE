    root: INFO
    org.hibernate: WARN
    org.hibernate.resource.transaction: WARN
    org.hibernate.orm.jdbc.mutation: WARN
    org.springframework.orm.jpa: WARN
    org.springframework.data: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO