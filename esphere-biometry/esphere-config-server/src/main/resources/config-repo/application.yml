# Configuration commune à tous les microservices ESPHERE
spring:
  cloud:
    config:
      server:
        git:
          uri: https://github.com/ESPHEREAPI/ERP-APIESPHERE.git
          default-label: main   # ← ajouter cette ligne
  datasource:
    url: jdbc:mysql://localhost:3306/biometry?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: DeepWater@2021
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: http://109.228.49.89/:8761/eureka/
    enabled: true
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

logging:
  level:
    com.esphere: DEBUG
    org.hibernate.SQL: WARN
    org.flywaydb: INFO

  