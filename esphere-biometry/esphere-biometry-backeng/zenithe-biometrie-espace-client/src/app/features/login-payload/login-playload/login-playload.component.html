<!-- Corps AdminLTE : hold-transition + login-page applique le fond -->
<div class="hold-transition login-page" style="min-height:100vh;">

  <div class="login-wrapper">

    <!-- ══════════════════════════════════════════════════════════
         BLOC LOGO  — positionné AVANT la carte pour être plus haut
         ════════════════════════════════════════════════════════ -->
    <div class="login-logo-block animate__animated animate__fadeInDown">

      <!-- Image logo -->
      <div class="logo-img-wrapper">
        <img
          src="./favicon-96x96.png"
          alt="Payload API Logo"
          class="logo-img elevation-4">
      </div>

      <!-- Texte applicatif -->
      <div class="logo-text-block">
        <span class="logo-title">
          <b>Payload</b>-API
        </span>
        <span class="logo-subtitle">
          Accès aux Attestations d'Assurance
        </span>
      </div>

    </div>
    <!-- ══ FIN LOGO ═════════════════════════════════════════════ -->


    <!-- ══════════════════════════════════════════════════════════
         CARTE FORMULAIRE
         ════════════════════════════════════════════════════════ -->
    <div class="card login-card animate__animated animate__fadeInUp">

      <div class="card-body login-card-body">

        <!-- Sous-titre de la carte -->
        <p class="login-box-msg">
          <i class="fas fa-lock mr-1"></i>
          Connectez-vous pour accéder à votre espace
        </p>

        <!-- ── Alerte token expiré ──────────────────────────── -->
        <div class="alert alert-warning alert-dismissible fade show"
             *ngIf="sessionExpired"
             role="alert">
          <i class="fas fa-clock mr-1"></i>
          <strong>Session expirée.</strong>
          Veuillez vous reconnecter.
          <button type="button" class="close" (click)="sessionExpired = false">
            <span>&times;</span>
          </button>
        </div>

        <!-- ── Alerte erreur connexion ──────────────────────── -->
        <div class="alert alert-danger alert-dismissible fade show"
             *ngIf="errorMessage"
             role="alert">
          <i class="fas fa-exclamation-triangle mr-1"></i>
          {{ errorMessage }}
          <button type="button" class="close" (click)="errorMessage = ''">
            <span>&times;</span>
          </button>
        </div>

        <!-- ════════════════════════════════════════════════════
             FORMULAIRE RÉACTIF Angular
             ════════════════════════════════════════════════ -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

          <!-- Champ Identifiant -->
          <div class="form-group">
            <div class="input-group"
                 [class.input-group--error]="isFieldInvalid('username')">
              <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Identifiant"
                formControlName="username"
                [class.is-invalid]="isFieldInvalid('username')"
                autocomplete="username"
                autofocus>
              <div class="input-group-append">
                <div class="input-group-text">
                  <i class="fas fa-user"></i>
                </div>
              </div>
              <div class="invalid-feedback" *ngIf="isFieldInvalid('username')">
                <i class="fas fa-exclamation-circle mr-1"></i>
                L'identifiant est obligatoire
              </div>
            </div>
          </div>

          <!-- Champ Mot de passe -->
          <div class="form-group">
            <div class="input-group"
                 [class.input-group--error]="isFieldInvalid('password')">
              <input
                [type]="showPassword ? 'text' : 'password'"
                id="password"
                class="form-control"
                placeholder="Mot de passe"
                formControlName="password"
                [class.is-invalid]="isFieldInvalid('password')"
                autocomplete="current-password">
              <div class="input-group-append">
                <!-- Bouton toggle affichage mot de passe -->
                <div class="input-group-text toggle-password"
                     (click)="togglePassword()"
                     [title]="showPassword ? 'Masquer' : 'Afficher'">
                  <i [class]="showPassword
                    ? 'fas fa-eye-slash'
                    : 'fas fa-eye'">
                  </i>
                </div>
              </div>
              <div class="invalid-feedback" *ngIf="isFieldInvalid('password')">
                <i class="fas fa-exclamation-circle mr-1"></i>
                Le mot de passe est obligatoire
              </div>
            </div>
          </div>

          <!-- Bouton Se connecter -->
          <div class="row mt-4">
            <div class="col-12">
              <button
                type="submit"
                class="btn btn-primary btn-block btn-login"
                [disabled]="isLoading">

                <!-- Spinner chargement -->
                <span *ngIf="isLoading"
                      class="spinner-border spinner-border-sm mr-2"
                      role="status"
                      aria-hidden="true">
                </span>

                <i *ngIf="!isLoading" class="fas fa-sign-in-alt mr-2"></i>

                {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
              </button>
            </div>
          </div>

        </form>
        <!-- ════ FIN FORMULAIRE ══════════════════════════════ -->

      </div>

      <!-- Pied de carte -->
      <div class="card-footer text-center text-muted py-2">
        <small>
          <i class="fas fa-copyright mr-1"></i>
          {{ currentYear }} Payload API &mdash; v1.0.0
        </small>
      </div>

    </div>
    <!-- ══ FIN CARTE ═════════════════════════════════════════════ -->

  </div>
  <!-- ══ FIN WRAPPER ════════════════════════════════════════════ -->

</div>
