# ==============================================================================
# BOOTSTRAP — esphere-ass-microservice-admin
# Chargé AVANT application.yml
# Permet à Spring Cloud Config de s'initialiser en premier.
# ==============================================================================

spring:
  application:
    name: esphere-ass-microservice-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      # false en dev (Config Server optionnel), true en prod via variable d'env
      enabled: ${CONFIG_SERVER_ENABLED:false}
      fail-fast: false
      retry:
        max-attempts: 3
        initial-interval: 1000
        max-interval: 5000
        multiplier: 1.5
