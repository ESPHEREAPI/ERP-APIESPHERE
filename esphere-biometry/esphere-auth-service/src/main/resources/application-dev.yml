spring:
  datasource:
    url: jdbc:mysql://localhost:3306/biometry-test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:DeepWater@2021}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  config:
    import: "optional:configserver:"

  main:
    lazy-initialization: true

  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 50

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  endpoint:
    health:
      show-details: always
  metrics:
    enable:
      all: false

logging:
  level:
    com.esphere: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{25} - %msg%n"
