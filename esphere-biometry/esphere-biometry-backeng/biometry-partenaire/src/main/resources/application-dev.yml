# ═══════════════════════════════════════════════════════════════
# PROFIL DEV — biometry-partenaire
# Lancement : mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ═══════════════════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/biometry-test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:DeepWater@2021}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        generate_statistics: true
        highlight_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

# Eureka — désactivé en dev local
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# CORS — permissif en dev
cors:
  allowed-origins: "http://localhost:4200,http://localhost:3000"

# Zipkin — désactivé en dev
management:
  zipkin:
    tracing:
      endpoint: ""

# Logging — verbeux en dev
logging:
  level:
    root: INFO
    db.biometry: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
    com.zaxxer.hikari: INFO
