spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:biometry-test}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:DeepWater@2021}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
      pool-name: HikariPool-notification

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  config:
    import: optional:configserver:http://${CONFIG_HOST:109.228.49.89}:8888

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:109.228.49.89}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOSTNAME:109.228.49.89}:8761/eureka/

esphere:
  validation:
    url: http://localhost:8085
  service-sante:
    telephones: ${SS_TELEPHONES:694923568,686086116}

sms:
  api:
    url: ${SMS_API_URL:https://smsvas.com/bulk/public/index.php/api/v1/sendsms}
    user: ${SMS_API_USER:info@zenitheinsurance.com}
    password: ${SMS_API_PASSWORD:biometrie2023}
    senderid: ${SMS_SENDER_ID:ZENITHE}

logging:
  file:
    name: ${LOG_PATH:C:/esphere/logs}/notification.log
  level:
    root: WARN
    com.esphere: INFO
    org.flywaydb: WARN
