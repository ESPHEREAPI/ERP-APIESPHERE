# ==============================================================================
# PROFIL PRODUCTION — application-prod.yml
# Activer avec : -Dspring.profiles.active=prod
# Variables d'environnement OBLIGATOIRES :
#   ORACLE_URL, ORACLE_USER, ORACLE_PASSWORD
#   JWT_SECRET (min 256 bits)
#   KEYSTORE_PATH, KEYSTORE_PASSWORD, KEY_ALIAS
#   EUREKA_SERVER_URL
# ==============================================================================

spring:
  cloud:
    config:
      enabled: false

  # Flyway strict en production
  flyway:
    out-of-order: false
    repair-on-migrate: false
    clean-on-validation-error: false
    ignore-migration-patterns:
      - "*:missing"
      - "*:future"

  # Schéma géré exclusivement par Flyway — Hibernate lecture seule
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  hikari:
    maximum-pool-size: 20
    minimum-idle: 5

# ── Serveur HTTPS production ──────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8083}
#  ssl:
#    enabled: true
#    key-store: ${KEYSTORE_PATH:classpath:keystore.p12}
#    key-store-password: ${KEYSTORE_PASSWORD:zenithe}
#    key-store-type: PKCS12
#    key-alias: ${KEY_ALIAS:gateway}
#    protocol: TLS
#    enabled-protocols: TLSv1.2,TLSv1.3
#    ciphers:
#      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
#      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
#      - TLS_DHE_RSA_WITH_AES_256_GCM_SHA384
#  http2:
#    enabled: true
  # Redirection HTTP → HTTPS gérée par le gateway
  error:
    include-message: never
    include-exception: false
    include-stacktrace: never
    include-binding-errors: never

# ── JWT production — secret fort obligatoire ─────────────────────────────────
jwt:
  secret: ${JWT_SECRET}          # OBLIGATOIRE — min 64 chars / 256 bits
  expiration: 3600000            # 1h en production
  refresh-expiration: 43200000   # 12h

# ── Eureka production ────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://77.68.94.193:8762/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:77.68.94.193}
    ip-address: ${EUREKA_INSTANCE_IP:77.68.94.193}
    prefer-ip-address: false
    non-secure-port: ${server.port}
    secure-port-enabled: false
    non-secure-port-enabled: true
    status-page-url: http://${eureka.instance.hostname}:${server.port}/actuator/info
    health-check-url: http://${eureka.instance.hostname}:${server.port}/actuator/health
    home-page-url: http://${eureka.instance.hostname}:${server.port}/

# ── CORS production : origines autorisées explicites ─────────────────────────
cors:
  allowed-origins: "${FRONTEND_URL:https://77.68.94.193:4141,https://77.68.94.193,https://77.68.94.193:*}"
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers:
    - Authorization
    - Content-Type
    - X-Requested-With
    - Accept
    - Origin
    - X-Refresh-Token
  exposed-headers: Authorization,X-Refresh-Token
  allow-credentials: true
  max-age: 1800

# ── Actuator — exposer uniquement health et info ─────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  tracing:
    enabled: ${TRACING_ENABLED:false}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}

# ── Swagger désactivé en production ─────────────────────────────────────────
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ── Logging minimal en production ────────────────────────────────────────────
logging:
  level:
    root: WARN
    service_administration_api: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:C:/zen-it-biometrie/logs}/esphere-ass-admin.log
    max-size: 50MB
    max-history: 30
