# ==============================================================================
# ESPHERE-ASS EUREKA SERVER — Configuration principale
# Port : 8762
# Rôle : Registre de services Spring Cloud Netflix
# Les profils dev/prod surchargent ce fichier.
# ==============================================================================

spring:
  application:
    name: esphere-ass-eureka-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  cloud:
    config:
      enabled: false        # Le Config Server ne doit pas dépendre d'Eureka
      fail-fast: false
    compatibility-verifier:
      enabled: false

# ── Serveur ───────────────────────────────────────────────────────────────────
server:
  port: 8762
  error:
    include-message: always
    include-exception: false
    include-stacktrace: never

# ── Eureka — mode standalone (le serveur ne s'enregistre pas chez lui-même) ──
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
    renewal-percent-threshold: 0.49

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
