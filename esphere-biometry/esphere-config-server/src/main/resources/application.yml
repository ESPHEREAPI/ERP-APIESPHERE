server:
  port: ${SERVER_PORT:8888}

spring:
  cloud:
    config:
      server:
        git:
          uri: https://github.com/ESPHEREAPI/ERP-APIESPHERE.git
          default-label: main   # ← ajouter cette ligne
  application:
    name: esphere-config-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.esphere: INFO
    org.springframework.cloud.config: INFO
