
# ==============================================================================
# PROFIL PRODUCTION — esphere-ass-gateway-proxy
# Activer avec : -Dspring.profiles.active=prod
# Variables d'environnement OBLIGATOIRES :
#   EUREKA_SERVER_URL          — URL Eureka        (ex: https://77.68.94.193:8762/eureka/)
#   EUREKA_INSTANCE_HOSTNAME   — IP/hostname public (ex: 77.68.94.193)
#   EUREKA_INSTANCE_IP         — IP publique
#   SERVICE_BIOMETRIE_URL      — URL biométrie      (ex: https://77.68.94.193:8081)
#   SERVICE_ADMIN_URL          — URL admin          (ex: https://77.68.94.193:8083)
#   SERVICE_BIOMETRIE_PART_URL — URL biométrie part.(ex: https://77.68.94.193:8082)
#   MONITORING_URL             — URL actuator       (ex: https://77.68.94.193:8000)
#   KEYSTORE_PATH              — Chemin keystore PKCS12
#   KEYSTORE_PASSWORD          — Mot de passe keystore
#   KEY_ALIAS                  — Alias de la clé
#   CONFIG_SERVER_URL          — URL Config Server  (ex: https://77.68.94.193:8888)
#   ZIPKIN_URL                 — URL Zipkin         (ex: https://zipkin:9411/api/v2/spans)
# ==============================================================================

# ── Serveur HTTPS ─────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:4141}
  ssl:
    enabled: true
    key-store: ${KEYSTORE_PATH:C:/zen-it-biometrie/keystore.p12}
    key-store-password: ${KEYSTORE_PASSWORD:zenithe}
    key-store-type: PKCS12
    key-alias: ${KEY_ALIAS:gateway}
#    protocol: TLS
#    enabled-protocols: TLSv1.2,TLSv1.3
  http2:
    enabled: true
  error:
    include-message: never
    include-exception: false
    include-stacktrace: never

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:77.68.94.193}
    ip-address: ${EUREKA_INSTANCE_IP:77.68.94.193}
    prefer-ip-address: false
    secure-port: ${server.port}
    secure-port-enabled: true
    non-secure-port-enabled: false
    status-page-url: http://${eureka.instance.hostname}:${server.port}/actuator/info
    health-check-url: http://${eureka.instance.hostname}:${server.port}/actuator/health
    home-page-url: http://${eureka.instance.hostname}:${server.port}/
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://77.68.94.193:8762/eureka/}

# ── Spring Cloud ──────────────────────────────────────────────────────────────
spring:
  cloud:
    config:
      enabled: false

    gateway:
      # ── Client HTTP sortant — accepte les certs auto-signés des microservices
      httpclient:
        ssl:
          use-insecure-trust-manager: true
        connect-timeout: 30000
        response-timeout: 120000

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://77.68.94.193:4141"
              - "https://77.68.94.193"
              - "https://77.68.94.193:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - X-Refresh-Token
            allowCredentials: true
            maxAge: 3600

      routes:
        # Route 0 : Service Biométrie
        - id: service-biometrie
          uri: ${SERVICE_BIOMETRIE_URL:http://77.68.94.193:8081}
          predicates:
            - Path=/gateway-proxy/api/service-biometrie/**
          filters:
            - StripPrefix=3
            - PreserveHostHeader

        # Route 1 : Service Administration
        - id: service-admin
          uri: ${SERVICE_ADMIN_URL:http://77.68.94.193:8083}
          predicates:
            - Path=/gateway-proxy/api/esphere-ass-microservice-admin/**
          filters:
            - StripPrefix=3
            - PreserveHostHeader

        # Route 2 : Service Biométrie Partenaire
        - id: service-biometrie-partenaire
          uri: ${SERVICE_BIOMETRIE_PART_URL:http://77.68.94.193:8082}
          predicates:
            - Path=/gateway-proxy/api/service-biometrie-partenaire/**
          filters:
            - StripPrefix=3
            - PreserveHostHeader

        # Route 3 : Actuator monitoring — accès interne uniquement
        - id: actuator-monitoring
          uri: ${MONITORING_URL:http://77.68.94.193:8000}
          predicates:
            - Path=/internal/actuator/**
            - RemoteAddr=127.0.0.1,77.68.94.193
          filters:
            - RewritePath=/internal/actuator/(?<segment>.*), /actuator/${segment}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: 0.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:C:/zen-it-biometrie/logs}/esphere-ass-gateway.log
    max-size: 50MB
    max-history: 30

