<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Mot de passe modifié</title>
  <style>
    body { background:#f0f4f8; font-family:'Segoe UI',Arial,sans-serif; color:#2d3748; }
    .wrapper { max-width:600px; margin:40px auto; background:#fff;
               border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.08); }
    .header { background:linear-gradient(135deg,#d97706 0%,#b45309 100%);
              padding:40px 32px; text-align:center; }
    .header h1 { color:#fff; font-size:24px; font-weight:700; margin-top:12px; }
    .body { padding:36px 32px; }
    .body p { line-height:1.7; margin-bottom:16px; font-size:15px; }
    .alert-box { background:#fffbeb; border:1px solid #fcd34d;
                 border-radius:8px; padding:16px 20px; margin:20px 0; }
    .cta-btn { display:inline-block; background:#d97706; color:#fff !important;
               text-decoration:none; padding:12px 32px; border-radius:8px;
               font-size:15px; font-weight:700; }
    .footer { background:#f8fafc; border-top:1px solid #e2e8f0;
              padding:20px 32px; text-align:center; font-size:12px; color:#a0aec0; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div style="font-size:40px">🔑</div>
    <h1 th:text="${fromName}">ZEN-BIO</h1>
  </div>
  <div class="body">
    <p>Bonjour <strong th:text="${recipientName}">Nom</strong>,</p>
    <p>Le mot de passe de votre compte a été <strong>modifié</strong> par un administrateur.</p>

    <div class="alert-box">
      ⚠️ Si vous n'êtes pas à l'origine de cette demande, contactez immédiatement votre administrateur.
    </div>

    <div style="text-align:center; margin:24px 0;">
      <a th:href="${loginUrl}" class="cta-btn">Se connecter avec le nouveau mot de passe</a>
    </div>
  </div>
  <div class="footer">
    <p>© <span th:text="${fromName}">AssurAdmin</span> — Email automatique, ne pas répondre.</p>
  </div>
</div>
</body>
</html>
