# ==============================================================================
# BOOTSTRAP — Eureka Server
# Chargé AVANT application.properties
# ==============================================================================

spring:
  application:
    name: esphere-ass-eureka-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      enabled: false        # Le Config Server lui-même ne doit pas dépendre d'un autre config server
      fail-fast: false
