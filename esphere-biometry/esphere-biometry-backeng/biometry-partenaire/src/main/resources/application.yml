server:
  port: ${SERVER_PORT:8180}
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: esphere-biometrie-partenaire
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── JPA / Hibernate ───────────────────────────────────────────
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_history_partenaire
    validate-on-migrate: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
          time_zone: UTC
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
        storage_engine: innodb
        connection:
          provider_disables_autocommit: false

  # ── HikariCP ─────────────────────────────────────────────────
  datasource:
    hikari:
      pool-name: BiometryHikariPool
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  # ── Mail ──────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:secure.emailsrvr.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:info@zenitheinsurance.com}
    password: ${MAIL_PASSWORD}
    test-connection: false
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── Thymeleaf ─────────────────────────────────────────────────
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: true

  # ── Async Thread Pool ─────────────────────────────────────────
  task:
    execution:
      pool:
        core-size: 10
        max-size: 30
        queue-capacity: 500
        keep-alive: 60s
      thread-name-prefix: biometry-async-

  cloud:
    compatibility-verifier:
      enabled: false

# ── JWT ─────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    # ✅ expiration-ms → ApplicationPropertiesConfiguration$Jwt.expirationMs
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  # ✅ Alias plats pour @Value("${app.jwtExpirationMs}") et @Value("${app.jwtSecret}") dans JwtService
  # Ces noms étaient dans l'ancien application.properties et sont encore utilisés par @Value
  jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
  jwtSecret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

  mail:
    from: ${MAIL_FROM:info@zenitheinsurance.com}
    from-name: ZENITHE-BIOMETRY
  activation:
    base-url: ${FRONTEND_URL:http://localhost:4200}
    path: /activate
    default-duration-hours: 48

# ── Springdoc / Swagger ──────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

# ── Actuator ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0

# ── Logging commun ───────────────────────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:logs}/biometry-app.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

mail:
  logo:
    url: https://raw.githubusercontent.com/ESPHEREAPI/esphere-ass-erp/main/biometry-partenaire/biometry/src/main/resources/static/images/logo.png
    
