# ==============================================================================
# PROFIL PRODUCTION — esphere-ass-config-serveur
# Activer avec : -Dspring.profiles.active=prod
# ==============================================================================

spring:
  cloud:
    config:
      server:
        git:
          uri: ${GIT_CONFIG_URI:https://github.com/ESPHEREAPI/ERP-APIESPHERE.git}
          default-label: ${GIT_CONFIG_BRANCH:main}
          search-paths: >
            esphere-ass-api/esphere-ass-administration-api/src/main/resources,
            esphere-ass-api/esphere-ass-gateway-proxy/src/main/resources,
            esphere-ass-api/esphere-ass-biometrie-api/src/main/resources
          timeout: 30
          clone-on-start: false
          force-pull: true
          shallow: true
          username: ${GIT_USERNAME:}
          password: ${GIT_PASSWORD:}
          skip-ssl-validation: false

# ── Serveur HTTP production ───────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8888}
  error:
    include-message: never
    include-exception: false
    include-stacktrace: never

# ── Actuator — exposer uniquement health et info ─────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# ── Logging minimal en production ────────────────────────────────────────────
logging:
  level:
    root: WARN
    org.springframework.cloud.config: INFO
    org.springframework.boot: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"
