 <!-- content-wrapper -->
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1>{{ subscriberId ? 'Modifier le souscripteur' : 'Nouveau souscripteur' }}</h1>
          </div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-right">
              <li class="breadcrumb-item"><a routerLink="/">Accueil</a></li>
              <li class="breadcrumb-item"><a routerLink="/subscribers">Souscripteurs</a></li>
              <li class="breadcrumb-item active">{{ subscriberId ? 'Modification' : 'Création' }}</li>
            </ol>
          </div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="row">
          <div class="col-12">
            <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show">
              <i class="fas fa-check-circle mr-2"></i>{{ successMessage }}
              <button type="button" class="close" (click)="successMessage = ''">
                <span>&times;</span>
              </button>
            </div>

            <app-subscriber-form
              [subscriberId]="subscriberId"
              (saved)="onSaved($event)"
              (cancelled)="onCancelled()"
            ></app-subscriber-form>
          </div>
        </div>
      </div>
    </section>
