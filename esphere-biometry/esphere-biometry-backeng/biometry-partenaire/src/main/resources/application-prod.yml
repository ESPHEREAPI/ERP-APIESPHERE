# ═══════════════════════════════════════════════════════════════
# PROFIL PROD — biometry-partenaire
# Toutes les valeurs sensibles via variables d'environnement
# ═══════════════════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:biometry-test}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:DeepWater@2021}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
        highlight_sql: false

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# Eureka — activé en prod
eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:109.228.49.89}
    ip-address: ${EUREKA_HOSTNAME:109.228.49.89}
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${SERVER_PORT:8082}
    lease-renewal-interval-in-seconds: 10
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      # ✅ Port 8761 (corrigé — était 8762)
      defaultZone: http://${EUREKA_HOSTNAME:109.228.49.89}:8761/eureka/

# CORS — strict en prod
cors:
  allowed-origins: ${CORS_ORIGINS:https://zenbio.zenitheinsurance.com}

# Zipkin — actif en prod (optionnel)
management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# Logging — minimal en prod
logging:
  level:
    root: WARN
    db.biometry: INFO
    org.hibernate.SQL: ERROR
    org.springframework.security: WARN
    org.springframework.mail: WARN
