# ==============================================================================
# PROFIL PRODUCTION — esphere-ass-eureka-server
# Activer avec : -Dspring.profiles.active=prod
# Variables d'environnement OBLIGATOIRES :
#   EUREKA_INSTANCE_HOSTNAME  — IP/hostname public du serveur (ex: 77.68.94.193)
#   EUREKA_INSTANCE_IP        — IP publique du serveur
#   KEYSTORE_PATH             — Chemin vers le keystore PKCS12
#   KEYSTORE_PASSWORD         — Mot de passe du keystore
#   KEY_ALIAS                 — Alias de la clé
# ==============================================================================

# ── Serveur HTTPS production ──────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8762}
#  ssl:
#    enabled: true
#    key-store: ${KEYSTORE_PATH:classpath:keystore.p12}
#    key-store-password: ${KEYSTORE_PASSWORD:zenithe}
#    key-store-type: PKCS12
#    key-alias: ${KEY_ALIAS:gateway}
#    protocol: TLS
#    enabled-protocols: TLSv1.2,TLSv1.3
#  http2:
#    enabled: true
  error:
    include-message: never
    include-exception: false
    include-stacktrace: never

# ── Eureka production ────────────────────────────────────────────────────────
eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:77.68.94.193}
    ip-address: ${EUREKA_INSTANCE_IP:77.68.94.193}
    prefer-ip-address: false
    non-secure-port: ${server.port}
    secure-port-enabled: false
    non-secure-port-enabled: true
    status-page-url: http://${eureka.instance.hostname}:${server.port}/actuator/info
    health-check-url: http://${eureka.instance.hostname}:${server.port}/actuator/health
    home-page-url: http://${eureka.instance.hostname}:${server.port}/
  client:
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Self-preservation activée en prod (stabilité du registre)
    enable-self-preservation: true
    eviction-interval-timer-in-ms: 10000
    renewal-percent-threshold: 0.85

# ── Actuator — exposer uniquement health et info ─────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# ── Logging minimal en production ────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.netflix.eureka: INFO
    com.netflix.discovery: WARN
    org.springframework.cloud.netflix: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:C:/zen-it-biometrie/logs}/esphere-ass-eureka-server.log
    max-size: 50MB
    max-history: 30
