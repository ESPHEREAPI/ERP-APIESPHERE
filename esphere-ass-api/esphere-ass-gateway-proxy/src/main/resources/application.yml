# ==============================================================================
# ESPHERE-ASS GATEWAY PROXY — Configuration principale
# Port : 4141
# Rôle : Point d'entrée unique, routage vers les microservices
# Les profils dev/prod surchargent ce fichier.
# ==============================================================================

spring:
  application:
    name: esphere-ass-gateway-proxy
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  cloud:
    config:
      enabled: false
      fail-fast: false
    compatibility-verifier:
      enabled: false
    gateway:
      # Discovery locator désactivé — routing manuel explicite
      discovery:
        locator:
          enabled: false
      # Déduplication des headers CORS
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      # SSL sortant (appels vers microservices)
      httpclient:
        ssl:
          use-insecure-trust-manager: true
        connect-timeout: 30000
        response-timeout: 120s
        pool:
          max-idle-time: 60s
      httpserver:
        idle-timeout: 120s

# ── Serveur ───────────────────────────────────────────────────────────────────
server:
  port: 4141
  ssl:
    enabled: false
  error:
    include-message: always
    include-exception: false
    include-stacktrace: never

# ── Eureka Client ─────────────────────────────────────────────────────────────
eureka:
  client:
    enabled: true
    fetch-registry: true
    register-with-eureka: true
  instance:
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    prefer-ip-address: true

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
