# ==============================================================================
# ESPHERE-ASS — VirtualHost Apache WampServer 3.7 (Windows Server 2016)
# Apache 2.4.62.1 — WampServer path : C:\wamp64v3_7\
#
# Modules à activer dans httpd.conf (décommenter) :
#   LoadModule rewrite_module        modules/mod_rewrite.so
#   LoadModule ssl_module            modules/mod_ssl.so
#   LoadModule socache_shmcb_module  modules/mod_socache_shmcb.so
#   LoadModule proxy_module          modules/mod_proxy.so
#   LoadModule proxy_http_module     modules/mod_proxy_http.so
#   LoadModule headers_module        modules/mod_headers.so
#   LoadModule deflate_module        modules/mod_deflate.so
#
# Inclure ce fichier depuis httpd.conf :
#   Include conf/extra/httpd-vhosts.conf
#   (ou copier ce contenu dans httpd-vhosts.conf)
#
# Certificats SSL (générés par ssl\generate-cert.bat) :
#   C:/wamp64V3_7/bin/apache/apache2.4.62.1/conf/ssl/gateway.crt
#   C:/wamp64V3_7/bin/apache/apache2.4.62.1/conf/ssl/gateway.key
#
# Fichiers Angular :
#   C:/wamp64v3_7/www/web-app/esphere-ass/   ← copier le dist ici
# ==============================================================================

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName 77.68.94.193
    RewriteEngine On
    RewriteRule ^(.*)$ https://77.68.94.193$1 [R=301,L]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName 77.68.94.193
    DocumentRoot "c:/wamp64v3_7/www/web-app"

    # ── SSL ────────────────────────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile    "C:/wamp64V3_7/bin/apache/apache2.4.62.1/conf/ssl/gateway.crt"
    SSLCertificateKeyFile "C:/wamp64V3_7/bin/apache/apache2.4.62.1/conf/ssl/gateway.key"
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5
    SSLHonorCipherOrder   on

    # ── SSL Proxy — pour communiquer avec la Gateway HTTPS :4141 ───────────────
    SSLProxyEngine          On
    SSLProxyVerify          none
    SSLProxyCheckPeerCN     off
    SSLProxyCheckPeerName   off
    SSLProxyCheckPeerExpire off

    # ── Proxy vers la Gateway Spring Boot (HTTPS :4141) ────────────────────────
    ProxyPreserveHost On
    ProxyRequests     Off
    ProxyTimeout      300

    ProxyPass        /gateway-proxy/ https://localhost:4141/gateway-proxy/ retry=0 timeout=300
    ProxyPassReverse /gateway-proxy/ https://localhost:4141/gateway-proxy/

    # ── Preflight OPTIONS — intercepter avant le proxy ────────────────────────
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]

    # ── CORS — origin explicite obligatoire avec Allow-Credentials ─────────────
    # IMPORTANT : Allow-Origin ne peut PAS être "*" si Allow-Credentials est true
    <IfModule mod_headers.c>
        Header always set Access-Control-Allow-Origin      "https://77.68.94.193"
        Header always set Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        Header always set Access-Control-Allow-Headers     "Content-Type, Authorization, X-Requested-With, Accept, Origin"
        Header always set Access-Control-Allow-Credentials "true"
    </IfModule>

    # ── Compression Gzip ────────────────────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE image/svg+xml font/woff font/woff2
    </IfModule>

    # ── APPLICATION : ESPHERE-ASS (Angular SPA sous /esphere-ass/) ────────────
    # IMPORTANT : le "c:" est obligatoire dans le chemin de l'Alias
    Alias /esphere-ass "c:/wamp64v3_7/www/web-app/esphere-ass"

    <Directory "c:/wamp64v3_7/www/web-app/esphere-ass">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Angular SPA routing — tout renvoie vers index.html
        # sauf les fichiers physiques et les appels /gateway-proxy/
        RewriteEngine On
        RewriteBase /esphere-ass/
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/gateway-proxy/
        RewriteRule ^ index.html [L]

        # Pas de cache sur index.html
        <FilesMatch "^index\.html$">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
            Header set Pragma "no-cache"
            Header set Expires "0"
        </FilesMatch>

        # Cache long sur les assets (Angular hache les noms en prod)
        <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>
    </Directory>

    # ── Répertoire parent ──────────────────────────────────────────────────────
    <Directory "c:/wamp64v3_7/www/web-app/">
        Options -Indexes +FollowSymLinks
        Require all granted
    </Directory>

    # ── Logs ───────────────────────────────────────────────────────────────────
    ErrorLog  "logs/ssl_error.log"
    CustomLog "logs/ssl_access.log" combined

</VirtualHost>
